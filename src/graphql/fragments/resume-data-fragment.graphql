fragment Resume on Resume {
    description
    id
    lastModifiedSeconds
    title
    resumeData {
        title {
            ...ResumeTitle
        }
        summary {
            ...ResumeSummary
        }
        contactItems {
            ...ContactItem
        }
        sections {
            ...ResumeSection
        }
        settings {
            ...ResumeSettings
        }

    }
}